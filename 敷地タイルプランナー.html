<style>
:root{
  --bg:#1c1c20;--surface:#242428;--surface2:#2c2c32;
  --border:rgba(255,255,255,0.09);--border2:rgba(255,255,255,0.18);
  --text:#eeebe6;--text2:#9e9b96;--text3:#62605c;
  --blue:#5aabff;--green:#52d478;--pink:#f07ab0;--red:#e85555;--amber:#f5a930;
}
html,body{
  margin:0;padding:0;
  width:100%;height:100%;
  overflow:hidden;
  font-family:'Noto Sans JP',sans-serif;
  background:var(--bg);color:var(--text);
  box-sizing:border-box;
}
*{box-sizing:border-box;}

/* ── layout ── */
#app{
  display:flex;
  width:100vw;
  height:100vh;
}
#sidebar{
  width:272px;
  flex-shrink:0;
  height:100vh;
  overflow-y:auto;
  background:var(--surface);
  border-right:1px solid var(--border);
  z-index:2000;
  display:flex;
  flex-direction:column;
}
#map-wrap{
  flex:1;
  height:100vh;
  position:relative;
  min-width:0;
}
#map{
  position:absolute;
  top:0;left:0;right:0;bottom:0;
}

/* ── sidebar ── */
.sb-head{padding:16px 16px 12px;border-bottom:1px solid var(--border);}
.sb-title{font-size:14px;font-weight:700;letter-spacing:.05em;}
.sb-sub{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:2px;}
.sb-sec{padding:12px 16px;border-bottom:1px solid var(--border);}
.lbl{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin-bottom:8px;}
.field{margin-bottom:7px;}
.field label{font-size:11px;color:var(--text2);display:block;margin-bottom:3px;}
.field input,.field select{
  width:100%;height:32px;padding:0 9px;font-size:12px;font-family:inherit;
  border:1px solid var(--border);border-radius:8px;
  background:var(--surface2);color:var(--text);outline:none;
  transition:border-color .15s;
}
.field input:focus,.field select:focus{border-color:var(--blue);}
.field select option{background:#2c2c32;}
.search-row{display:flex;gap:6px;}
.search-row input{flex:1;}
.btn-go{
  height:32px;padding:0 12px;font-size:11px;font-family:inherit;
  background:var(--blue);color:#0a0a10;border:none;border-radius:8px;
  cursor:pointer;font-weight:700;transition:opacity .15s;white-space:nowrap;
}
.btn-go:hover{opacity:.82;}

/* tools */
.tool-btn{
  display:flex;align-items:center;gap:8px;padding:8px 10px;margin-bottom:4px;
  border-radius:8px;border:1.5px solid transparent;cursor:pointer;
  font-size:12px;font-family:inherit;font-weight:500;
  background:var(--surface2);color:var(--text);
  transition:all .15s;width:100%;text-align:left;
}
.tool-btn:hover{border-color:var(--border2);}
.tool-btn .icon{font-size:14px;width:18px;text-align:center;}
.tool-btn .tname{flex:1;}
.tool-btn .tdim{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);}
.tool-btn.t-unit {background:rgba(90,171,255,.12);}
.tool-btn.t-unit.active {border-color:var(--blue);background:rgba(90,171,255,.25);}
.tool-btn.t-park {background:rgba(82,212,120,.12);}
.tool-btn.t-park.active {border-color:var(--green);background:rgba(82,212,120,.25);}
.tool-btn.t-stair{background:rgba(240,122,176,.12);}
.tool-btn.t-stair.active{border-color:var(--pink);background:rgba(240,122,176,.25);}
.tool-btn.t-erase{background:rgba(232,85,85,.1);}
.tool-btn.t-erase.active{border-color:var(--red);background:rgba(232,85,85,.22);}
.tdiv{height:1px;background:var(--border);margin:5px 0;}

.slider-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.slider-row label{font-size:11px;color:var(--text2);white-space:nowrap;min-width:32px;}
.slider-row input[type=range]{flex:1;accent-color:var(--blue);}
.slider-val{font-size:11px;font-family:'DM Mono',monospace;color:var(--blue);min-width:36px;text-align:right;}
.presets{display:flex;gap:4px;flex-wrap:wrap;}
.pre-btn{
  flex:1;min-width:36px;height:24px;font-size:11px;font-family:inherit;
  background:var(--surface2);color:var(--text2);
  border:1px solid var(--border);border-radius:6px;cursor:pointer;transition:all .12s;
}
.pre-btn:hover{background:rgba(90,171,255,.15);color:var(--blue);border-color:var(--blue);}

.metrics-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.mc{background:var(--surface2);border-radius:8px;padding:8px 10px;}
.mc .ml{font-size:9px;color:var(--text3);margin-bottom:2px;}
.mc .mv{font-size:17px;font-weight:700;font-family:'DM Mono',monospace;}
.mc .mv .mu{font-size:10px;font-weight:400;color:var(--text3);font-family:inherit;margin-left:1px;}
.hint{font-size:10px;color:var(--text3);line-height:1.55;margin-top:8px;
  padding:7px 9px;background:var(--surface2);border-radius:6px;border-left:2px solid var(--border2);}

.sb-foot{padding:12px 16px;margin-top:auto;border-top:1px solid var(--border);}
.btn-clear{
  width:100%;height:32px;font-size:12px;font-family:inherit;
  border:1px solid var(--border);border-radius:8px;
  background:transparent;color:var(--text2);cursor:pointer;transition:all .15s;
}
.btn-clear:hover{background:rgba(232,85,85,.15);border-color:var(--red);color:var(--red);}

/* leaflet overrides */
.leaflet-control-attribution{background:rgba(0,0,0,.5)!important;color:#777!important;font-size:10px!important;}
.leaflet-control-attribution a{color:#999!important;}
.leaflet-control-zoom a{background:var(--surface)!important;color:var(--text)!important;border-color:var(--border)!important;}
.leaflet-control-layers{background:var(--surface)!important;color:var(--text)!important;border:1px solid var(--border)!important;font-size:12px!important;}
.leaflet-control-layers label{color:var(--text)!important;}

/* HUD */
#hud{
  position:absolute;bottom:24px;left:10px;z-index:1000;
  background:rgba(20,20,24,.9);color:var(--text2);
  font-size:10px;font-family:'DM Mono',monospace;
  padding:5px 10px;border-radius:6px;border:1px solid var(--border);
  pointer-events:none;
}
#mode-badge{
  position:absolute;top:10px;left:10px;z-index:1000;
  padding:5px 13px;border-radius:20px;font-size:11px;font-weight:700;
  letter-spacing:.04em;
  border:1px solid var(--border2);
  background:rgba(20,20,24,.85);color:var(--text2);
  transition:all .2s;pointer-events:none;
  backdrop-filter:blur(6px);
}
#mode-badge.on{background:rgba(90,171,255,.2);color:var(--blue);border-color:var(--blue);}
#mode-badge.erase{background:rgba(232,85,85,.2);color:var(--red);border-color:var(--red);}
</style>
</head>

<!-- SIDEBAR -->
<aside id="sidebar">
  <div class="sb-head">
    <div class="sb-title">敷地タイルプランナー</div>
    <div class="sb-sub">MAP OVERLAY EDITION</div>
  </div>

  <div class="sb-sec">

    <div style="margin-top:12px;">
      <div class="lbl">配置時の回転角度</div>
      <div class="slider-row">
        <label>角度</label>
        <input type="range" id="rot-range" min="0" max="359" value="0" oninput="onRotSlider()">
        <span class="slider-val" id="rot-val">0°</span>
      </div>
      <div class="presets">

        <button class="pre-btn" onclick="setRot(45)">45°</button>
        <button class="pre-btn" onclick="setRot(60)">60°</button>
        <button class="pre-btn" onclick="setRot(90)">90°</button>
      </div>
    </div>
  </div>

  <div class="sb-sec">
    <div class="lbl">配置サマリー</div>
    <div class="metrics-grid" id="metrics"></div>
    <div class="hint">ツール選択→地図クリックで配置。タイルをドラッグで移動、↻ハンドルで回転、×で削除。ESCで地図パンに戻る。</div>
  </div>

  <div class="sb-foot">
    <button class="btn-clear" onclick="clearAll()">全タイルを削除</button>
  </div>
</aside>

<script>
// ══════════════════════════════════════════
//  MAP — init AFTER DOM is ready
// ══════════════════════════════════════════
const map = L.map('map', {
  zoomControl: true,
  preferCanvas: false
}).setView([35.6896, 139.6917], 17);

// 国土地理院タイル — 登録不要・完全無料・日本政府提供
const gsiStd = L.tileLayer(
  'https://cyberjapandata.gsi.go.jp/xyz/std/{z}/{x}/{y}.png',
  {
    attribution: '<a href="https://maps.gsi.go.jp/development/ichiran.html">国土地理院</a>',
    maxZoom: 18
  }
);

const gsiPale = L.tileLayer(
  'https://cyberjapandata.gsi.go.jp/xyz/pale/{z}/{x}/{y}.png',
  {
    attribution: '<a href="https://maps.gsi.go.jp/development/ichiran.html">国土地理院</a>',
    maxZoom: 18
  }
);

const gsiPhoto = L.tileLayer(
  'https://cyberjapandata.gsi.go.jp/xyz/seamlessphoto/{z}/{x}/{y}.jpg',
  {
    attribution: '<a href="https://maps.gsi.go.jp/development/ichiran.html">国土地理院</a>',
    maxZoom: 18
  }
);

gsiStd.addTo(map);

L.control.layers(
  { '🗺 標準地図': gsiStd, '🗺 担色地図': gsiPale, '🛰 航空写真': gsiPhoto },
  {},
  { position: 'topright', collapsed: false }
).addTo(map);

// Force Leaflet to recalculate container size
setTimeout(() => { map.invalidateSize(); }, 100);

// ══════════════════════════════════════════
//  SEARCH
// ══════════════════════════════════════════
let searchMarker = null;
async function doSearch() {
  const q = document.getElementById('addr').value.trim();
  if (!q) return;
  try {
    const res = await fetch(
      'https://nominatim.openstreetmap.org/search?q=' +
      encodeURIComponent(q + ' 日本') + '&format=json&limit=1'
    );
    const d = await res.json();
    if (!d.length) { alert('住所が見つかりませんでした'); return; }
    const ll = L.latLng(+d[0].lat, +d[0].lon);
    map.setView(ll, 18);
    if (searchMarker) map.removeLayer(searchMarker);
    searchMarker = L.marker(ll).addTo(map).bindPopup(d[0].display_name).openPopup();
  } catch(e) { alert('検索に失敗しました'); }
}

// ══════════════════════════════════════════
//  SVG OVERLAY LAYER
// ══════════════════════════════════════════
const SvgLayer = L.Layer.extend({
  onAdd(map) {
    this._map = map;
    const pane = map.getPanes().overlayPane;
    this._svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    Object.assign(this._svg.style, {
      position: 'absolute', top: '0', left: '0',
      width: '100%', height: '100%',
      pointerEvents: 'none', overflow: 'visible',
      zIndex: '400'
    });
    this._defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
    this._svg.appendChild(this._defs);
    pane.appendChild(this._svg);
    map.on('zoomend moveend viewreset', this._reset, this);
    this._reset();
  },
  onRemove(map) {
    this._svg.remove();
    map.off('zoomend moveend viewreset', this._reset, this);
  },
  _reset() {
    const tl = map.containerPointToLayerPoint([0, 0]);
    L.DomUtil.setPosition(this._svg, tl);
    tiles.forEach(t => repositionTile(t));
  },
  getSvg()  { return this._svg; },
  getDefs() { return this._defs; }
});

const svgLayer = new SvgLayer();
svgLayer.addTo(map);

// ══════════════════════════════════════════
//  TILE DEFINITIONS
// ══════════════════════════════════════════
const TILE_DEFS = {
  unit:  { w: 16.5, d: 6,  fill: [90,171,255],  stroke: '#5aabff', label: '住戸',     hatch: false },
  park:  { w: 2.5,  d: 5,  fill: [82,212,120],  stroke: '#52d478', label: '駐車場',   hatch: false },
  stair: { w: 3,    d: 4,  fill: [240,122,176],  stroke: '#f07ab0', label: '非常階段', hatch: true  },
};

// ══════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════
let currentTool = null;
let currentRot  = 0;
let tileOpacity = 0.50;
let tiles       = [];
let uidCounter  = 0;

// ══════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════
function mpp() {
  const lat = map.getCenter().lat;
  return (156543.03392 * Math.cos(lat * Math.PI / 180)) / Math.pow(2, map.getZoom());
}
function fillColor(def) {
  const [r,g,b] = def.fill;
  return `rgba(${r},${g},${b},${tileOpacity})`;
}

// ══════════════════════════════════════════
//  CREATE TILE
// ══════════════════════════════════════════
function createTile(latlng, type, rot) {
  const def = TILE_DEFS[type];
  const uid = 'T' + (uidCounter++);
  const svg = svgLayer.getSvg();

  const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  g.setAttribute('id', uid);
  g.style.pointerEvents = 'all';
  g.style.cursor = 'grab';

  // hatch pattern
  if (def.hatch) {
    const pid = 'HP' + uid;
    const pat = document.createElementNS('http://www.w3.org/2000/svg', 'pattern');
    pat.setAttribute('id', pid);
    pat.setAttribute('patternUnits', 'userSpaceOnUse');
    pat.setAttribute('width', '10'); pat.setAttribute('height', '10');
    pat.setAttribute('patternTransform', 'rotate(45)');
    const ln = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    ln.setAttribute('x1','0');ln.setAttribute('y1','0');ln.setAttribute('x2','0');ln.setAttribute('y2','10');
    ln.setAttribute('stroke', def.stroke); ln.setAttribute('stroke-width','2'); ln.setAttribute('stroke-opacity','0.25');
    pat.appendChild(ln);
    svgLayer.getDefs().appendChild(pat);
  }

  function mk(tag, attrs) {
    const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
    for (const [k,v] of Object.entries(attrs)) el.setAttribute(k, v);
    return el;
  }

  // main rect
  const rect = mk('rect', { rx:'3', fill: fillColor(def), stroke: def.stroke, 'stroke-width':'1.5' });
  g.appendChild(rect);

  // hatch rect
  let hRect = null;
  if (def.hatch) {
    hRect = mk('rect', { rx:'3', fill: `url(#HP${uid})` });
    g.appendChild(hRect);
  }

  // label
  const txt = mk('text', { 'text-anchor':'middle', 'dominant-baseline':'middle',
    fill: def.stroke, 'font-family':'Noto Sans JP,sans-serif', 'font-weight':'700', 'pointer-events':'none' });
  txt.textContent = def.label;
  g.appendChild(txt);

  const dim = mk('text', { 'text-anchor':'middle', 'dominant-baseline':'middle',
    fill: def.stroke, 'font-family':'DM Mono,monospace', 'pointer-events':'none', opacity:'0.8' });
  dim.textContent = `${def.w}×${def.d}m`;
  g.appendChild(dim);

  // rotation handle
  const rh = mk('circle', { r:'8', fill: def.stroke, stroke:'#fff', 'stroke-width':'1.5', opacity:'0', cursor:'grab' });
  rh.style.pointerEvents = 'all';
  g.appendChild(rh);
  const rhTxt = mk('text', { 'text-anchor':'middle', 'dominant-baseline':'middle',
    fill:'#fff', 'font-size':'10', 'pointer-events':'none', opacity:'0' });
  rhTxt.textContent = '↻';
  g.appendChild(rhTxt);

  // delete handle
  const dh = mk('circle', { r:'9', fill:'#e85555', stroke:'#fff', 'stroke-width':'1.5', opacity:'0', cursor:'pointer' });
  dh.style.pointerEvents = 'all';
  g.appendChild(dh);
  const dhTxt = mk('text', { 'text-anchor':'middle', 'dominant-baseline':'middle',
    fill:'#fff', 'font-size':'12', 'font-weight':'700', 'pointer-events':'none', opacity:'0' });
  dhTxt.textContent = '×';
  g.appendChild(dhTxt);

  const tile = { uid, g, rect, hRect, txt, dim, rh, rhTxt, dh, dhTxt,
                 latlng: L.latLng(latlng.lat, latlng.lng), type, rot, def };

  // hover
  g.addEventListener('mouseenter', () => {
    if (currentTool === 'erase') { g.style.cursor='pointer'; return; }
    [rh,rhTxt,dh,dhTxt].forEach(e=>e.setAttribute('opacity','1'));
  });
  g.addEventListener('mouseleave', () => {
    g.style.cursor='grab';
    [rh,rhTxt,dh,dhTxt].forEach(e=>e.setAttribute('opacity','0'));
  });

  // click (erase mode)
  g.addEventListener('click', e => {
    if (currentTool === 'erase') { e.stopPropagation(); deleteTile(tile); }
  });

  // delete btn
  dh.addEventListener('click', e => { e.stopPropagation(); deleteTile(tile); });

  // drag-to-move
  setupMoveDrag(g, tile);

  // rotation drag
  setupRotDrag(rh, tile);

  svg.appendChild(g);
  tiles.push(tile);
  repositionTile(tile);
  updateMetrics();
}

// ══════════════════════════════════════════
//  REPOSITION
// ══════════════════════════════════════════
function repositionTile(tile) {
  const def  = tile.def;
  const pt   = map.latLngToLayerPoint(tile.latlng);
  const m    = mpp();
  const pw   = def.w / m;
  const ph   = def.d / m;

  tile.rect.setAttribute('x','0'); tile.rect.setAttribute('y','0');
  tile.rect.setAttribute('width', pw); tile.rect.setAttribute('height', ph);
  tile.rect.setAttribute('fill', fillColor(def));

  if (tile.hRect) {
    tile.hRect.setAttribute('x','0'); tile.hRect.setAttribute('y','0');
    tile.hRect.setAttribute('width', pw); tile.hRect.setAttribute('height', ph);
  }

  const fs = Math.max(8, Math.min(13, Math.min(pw,ph)/4));
  tile.txt.setAttribute('x', pw/2); tile.txt.setAttribute('y', ph/2 - fs*0.75);
  tile.txt.setAttribute('font-size', fs);
  tile.dim.setAttribute('x', pw/2); tile.dim.setAttribute('y', ph/2 + fs*0.85);
  tile.dim.setAttribute('font-size', fs*0.8);

  // handles
  tile.rh.setAttribute('cx', pw/2);   tile.rh.setAttribute('cy', ph+14);
  tile.rhTxt.setAttribute('x', pw/2); tile.rhTxt.setAttribute('y', ph+14);
  tile.dh.setAttribute('cx', pw+10);  tile.dh.setAttribute('cy', -10);
  tile.dhTxt.setAttribute('x', pw+10);tile.dhTxt.setAttribute('y', -10);

  // transform: centre→rotate→offset
  tile.g.setAttribute('transform',
    `translate(${pt.x},${pt.y}) rotate(${tile.rot}) translate(${-pw/2},${-ph/2})`
  );

  updateHUD();
}

// ══════════════════════════════════════════
//  DRAG MOVE
// ══════════════════════════════════════════
function setupMoveDrag(el, tile) {
  let active=false, startCP, startLL;
  el.addEventListener('mousedown', e => {
    if (e.target===tile.rh||e.target===tile.dh) return;
    if (currentTool==='erase') return;
    e.stopPropagation(); e.preventDefault();
    active=true;
    startCP = map.mouseEventToContainerPoint(e);
    startLL = L.latLng(tile.latlng.lat, tile.latlng.lng);
    map.dragging.disable();
    el.style.cursor='grabbing';
  });
  document.addEventListener('mousemove', e => {
    if (!active) return;
    const cp = map.mouseEventToContainerPoint(e);
    const dx=cp.x-startCP.x, dy=cp.y-startCP.y;
    const m=mpp();
    tile.latlng = L.latLng(
      startLL.lat - dy*m/111320,
      startLL.lng + dx*m/(111320*Math.cos(startLL.lat*Math.PI/180))
    );
    repositionTile(tile);
  });
  document.addEventListener('mouseup', () => {
    if (active) { active=false; el.style.cursor='grab'; }
  });
}

// ══════════════════════════════════════════
//  ROTATION DRAG
// ══════════════════════════════════════════
function setupRotDrag(handle, tile) {
  handle.addEventListener('mousedown', e => {
    e.stopPropagation(); e.preventDefault();
    map.dragging.disable();
    const cp = map.latLngToContainerPoint(tile.latlng);
    const sa = Math.atan2(e.clientY-cp.y, e.clientX-cp.x)*180/Math.PI;
    const sr = tile.rot;
    function onMove(ev) {
      const c = map.latLngToContainerPoint(tile.latlng);
      const a = Math.atan2(ev.clientY-c.y, ev.clientX-c.x)*180/Math.PI;
      tile.rot = ((sr+(a-sa))%360+360)%360;
      repositionTile(tile);
    }
    function onUp() {
      document.removeEventListener('mousemove',onMove);
      document.removeEventListener('mouseup',onUp);
    }
    document.addEventListener('mousemove',onMove);
    document.addEventListener('mouseup',onUp);
  });
}

// ══════════════════════════════════════════
//  DELETE / CLEAR
// ══════════════════════════════════════════
function deleteTile(tile) {
  tile.g.remove();
  const pat = document.getElementById('HP'+tile.uid);
  if (pat) pat.remove();
  tiles = tiles.filter(t=>t!==tile);
  updateMetrics();
}
function clearAll() {
  if (!confirm('全タイルを削除しますか？')) return;
  [...tiles].forEach(t=>deleteTile(t));
}

// ══════════════════════════════════════════
//  TOOL
// ══════════════════════════════════════════
function setTool(t) {
  currentTool = t;
  document.querySelectorAll('.tool-btn').forEach(el=>el.classList.remove('active'));
  const el = document.getElementById('tool-'+t);
  if (el) el.classList.add('active');
  const badge = document.getElementById('mode-badge');
  if (t==='erase') {
    badge.textContent='消去モード — タイルをクリック';
    badge.className='erase';
    map.dragging.enable();
    map.getContainer().style.cursor='default';
  } else {
    badge.textContent='配置モード — 地図をクリックして配置';
    badge.className='on';
    map.dragging.disable();
    map.getContainer().style.cursor='crosshair';
  }
}
document.addEventListener('keydown', e=>{
  if (e.key==='Escape') {
    currentTool=null;
    document.querySelectorAll('.tool-btn').forEach(el=>el.classList.remove('active'));
    document.getElementById('mode-badge').textContent='地図パンモード';
    document.getElementById('mode-badge').className='';
    map.dragging.enable();
    map.getContainer().style.cursor='';
  }
});

// ══════════════════════════════════════════
//  MAP CLICK
// ══════════════════════════════════════════
map.on('click', e=>{
  if (!currentTool||currentTool==='erase') return;
  createTile(e.latlng, currentTool, currentRot);
});

// ══════════════════════════════════════════
//  CONTROLS
// ══════════════════════════════════════════
function setRot(v) {
  currentRot=v;
  document.getElementById('rot-range').value=v;
  document.getElementById('rot-val').textContent=v+'°';
}
function onRotSlider() {
  currentRot=+document.getElementById('rot-range').value;
  document.getElementById('rot-val').textContent=currentRot+'°';
}
function onOpacity() {
  tileOpacity=+document.getElementById('op-range').value/100;
  document.getElementById('op-val').textContent=Math.round(tileOpacity*100)+'%';
  tiles.forEach(t=>repositionTile(t));
}

// ══════════════════════════════════════════
//  HUD & METRICS
// ══════════════════════════════════════════
function updateHUD() {
  document.getElementById('z-lv').textContent=map.getZoom();
  document.getElementById('px-m').textContent=(1/mpp()).toFixed(1);
}
function updateMetrics() {
  let units=0,parks=0,stairs=0,unitA=0;
  tiles.forEach(t=>{
    if(t.type==='unit'){units++;unitA+=t.def.w*t.def.d;}
    if(t.type==='park')parks++;
    if(t.type==='stair')stairs++;
  });
  document.getElementById('metrics').innerHTML=`
    <div class="mc"><div class="ml">住戸数</div><div class="mv">${units}<span class="mu"> 戸</span></div></div>
    <div class="mc"><div class="ml">駐車区画</div><div class="mv">${parks}<span class="mu"> 台</span></div></div>
    <div class="mc"><div class="ml">非常階段</div><div class="mv">${stairs}<span class="mu"> 箇所</span></div></div>
    <div class="mc"><div class="ml">住戸床面積計</div><div class="mv">${Math.round(unitA).toLocaleString()}<span class="mu"> ㎡</span></div></div>
  `;
}

// ══════════════════════════════════════════
//  MAP EVENTS
// ══════════════════════════════════════════
map.on('zoomend moveend viewreset', ()=>{
  tiles.forEach(t=>repositionTile(t));
  updateHUD();
});

// Init
updateMetrics();
updateHUD();
</script>


</body></html>
